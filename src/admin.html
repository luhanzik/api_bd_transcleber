<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Gerenciar Tokens</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 40px; }
        .card { background: white; max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { color: #1e293b; margin-top: 0; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; font-size: 1rem; }
        button:hover { background: #1d4ed8; }
        .token-list { margin-top: 30px; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        .token-item { background: #f8fafc; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-family: monospace; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Gerador de Tokens</h1>
        <button onclick="generateToken()">Gerar Novo Token 🚀</button>
        <div class="token-list" id="tokenList">
            <h3>Tokens Ativos:</h3>
        </div>
    </div>
    <script>
        async function loadTokens() {
            const res = await fetch('/admin/list-tokens');
            const tokens = await res.json();
            const list = document.getElementById('tokenList');
            list.innerHTML = '<h3>Tokens Ativos:</h3>' + tokens.map(t => '<div class=\"token-item\">' + t + '</div>').join('');
        }
        async function generateToken() {
            const res = await fetch('/admin/generate-token', { method: 'POST' });
            const data = await res.json();
            alert('Novo token gerado: ' + data.token);
            loadTokens();
        }
        loadTokens();
    </script>
</body>
</html>
